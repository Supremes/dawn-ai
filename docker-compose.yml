services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BASE_URL=${BASE_URL}
      - CHAT_MODEL=${CHAT_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://embedding:7997}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-local-embedding-key} # 当前embedding container不做鉴权，直接使用固定值；生产环境请替换为实际值并做好安全防护
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/dawn_ai
      - SPRING_DATASOURCE_USERNAME=dawn
      - SPRING_DATASOURCE_PASSWORD=dawn123
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      embedding:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - dawn-network

  embedding:
    image: michaelf34/infinity:0.0.77
    restart: unless-stopped
    command: >-
      v2
      --model-id ${EMBEDDING_MODEL:-BAAI/bge-m3}
      --host 0.0.0.0
      --port 7997
      --url-prefix /v1
      --dtype ${EMBEDDING_DTYPE:-auto}
      --batch-size ${EMBEDDING_BATCH_SIZE:-8}
    ports:
      - "7997:7997"
    environment:
      - HF_HOME=/app/.cache
    volumes:
      - huggingface_cache:/app/.cache
    networks:
      - dawn-network

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: dawn_ai
      POSTGRES_USER: dawn
      POSTGRES_PASSWORD: dawn123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dawn -d dawn_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dawn-network

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dawn-network

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - dawn-network

  grafana:
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - dawn-network

volumes:
  huggingface_cache:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  dawn-network:
    driver: bridge
