<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" style="background:#fff9f0;font-family:'Comic Sans MS',cursive,sans-serif">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e03131"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9e44"/>
    </marker>
  </defs>

  <!-- ===== TITLE ===== -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Streaming 模式下的线程模型 &amp; 方案A 修复</text>

  <!-- ===== BEFORE (left panel) ===== -->
  <rect x="20" y="55" width="510" height="380" rx="12" fill="#fff0f0" stroke="#e03131" stroke-width="2.5" filter="url(#rough)" stroke-dasharray="6,2"/>
  <text x="275" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#e03131">❌ 修复前：ThreadLocal 跨线程断裂</text>

  <!-- Thread A box -->
  <rect x="40" y="95" width="220" height="300" rx="8" fill="#ffe8e8" stroke="#e03131" stroke-width="2" filter="url(#rough)"/>
  <text x="150" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#c92a2a">Thread A</text>
  <text x="150" y="130" text-anchor="middle" font-size="11" fill="#666">(chat-stream-xxx)</text>

  <rect x="55" y="140" width="190" height="30" rx="4" fill="#ffd6d6" stroke="#e03131" stroke-width="1.5"/>
  <text x="150" y="160" text-anchor="middle" font-size="11" fill="#333">StepCollector.init(10)</text>

  <rect x="55" y="180" width="190" height="30" rx="4" fill="#ffd6d6" stroke="#e03131" stroke-width="1.5"/>
  <text x="150" y="200" text-anchor="middle" font-size="11" fill="#333">MAX_STEPS = 10 ✅</text>

  <rect x="55" y="220" width="190" height="40" rx="4" fill="#ffb3b3" stroke="#e03131" stroke-width="1.5"/>
  <text x="150" y="237" text-anchor="middle" font-size="11" fill="#333">chatClient.stream()</text>
  <text x="150" y="252" text-anchor="middle" font-size="11" fill="#333">  .blockLast() ← 阻塞等待</text>

  <text x="150" y="290" text-anchor="middle" font-size="28">😴</text>
  <text x="150" y="315" text-anchor="middle" font-size="11" fill="#999">挂起中...</text>

  <!-- Thread B box -->
  <rect x="290" y="95" width="220" height="300" rx="8" fill="#ffe8e8" stroke="#e03131" stroke-width="2" filter="url(#rough)"/>
  <text x="400" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#c92a2a">Thread B</text>
  <text x="400" y="130" text-anchor="middle" font-size="11" fill="#666">(reactor-http-nio-2)</text>

  <rect x="305" y="140" width="190" height="30" rx="4" fill="#ffd6d6" stroke="#e03131" stroke-width="1.5"/>
  <text x="400" y="160" text-anchor="middle" font-size="11" fill="#333">接收 SSE chunk → tool_call</text>

  <rect x="305" y="180" width="190" height="30" rx="4" fill="#ffd6d6" stroke="#e03131" stroke-width="1.5"/>
  <text x="400" y="200" text-anchor="middle" font-size="11" fill="#333">KnowledgeSearchTool.apply()</text>

  <rect x="305" y="220" width="190" height="40" rx="4" fill="#ff8080" stroke="#c92a2a" stroke-width="2"/>
  <text x="400" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">MAX_STEPS.get() → null</text>
  <text x="400" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">💥 NullPointerException</text>

  <rect x="305" y="275" width="190" height="30" rx="4" fill="#ffd6d6" stroke="#e03131" stroke-width="1.5"/>
  <text x="400" y="291" text-anchor="middle" font-size="10" fill="#c92a2a">ToolExecutionAspect: 无日志，重抛</text>
  <text x="400" y="305" text-anchor="middle" font-size="10" fill="#c92a2a">LLM 收到错误 → reasoning_content 报失败</text>

  <!-- Cross arrow showing isolation -->
  <line x1="245" y1="190" x2="295" y2="190" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="270" y="183" text-anchor="middle" font-size="9" fill="#999">❌ 隔离</text>
  <text x="270" y="207" text-anchor="middle" font-size="9" fill="#e03131">各自独立</text>

  <!-- ThreadLocal boxes at bottom of "before" -->
  <rect x="40" y="405" width="100" height="22" rx="3" fill="#ffeaea" stroke="#e03131" stroke-width="1"/>
  <text x="90" y="420" text-anchor="middle" font-size="10" fill="#333">TL_A: MAX=10</text>
  <rect x="180" y="405" width="100" height="22" rx="3" fill="#eee" stroke="#999" stroke-width="1"/>
  <text x="230" y="420" text-anchor="middle" font-size="10" fill="#999">TL_B: MAX=null</text>

  <!-- ===== AFTER (right panel) ===== -->
  <rect x="570" y="55" width="510" height="380" rx="12" fill="#f0fff4" stroke="#2f9e44" stroke-width="2.5" filter="url(#rough)" stroke-dasharray="6,2"/>
  <text x="825" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f9e44">✅ 方案A：Micrometer 上下文传播</text>

  <!-- Thread A (after) -->
  <rect x="590" y="95" width="220" height="300" rx="8" fill="#e6fae6" stroke="#2f9e44" stroke-width="2" filter="url(#rough)"/>
  <text x="700" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Thread A</text>
  <text x="700" y="130" text-anchor="middle" font-size="11" fill="#666">(chat-stream-xxx)</text>

  <rect x="605" y="140" width="190" height="30" rx="4" fill="#c8f5c8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="700" y="160" text-anchor="middle" font-size="11" fill="#333">StepCollector.init(10)</text>

  <rect x="605" y="180" width="190" height="25" rx="4" fill="#c8f5c8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="700" y="197" text-anchor="middle" font-size="11" fill="#333">new StepCollectorContext(10)</text>

  <rect x="605" y="215" width="190" height="25" rx="4" fill="#a8f0a8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="700" y="230" text-anchor="middle" font-size="11" fill="#1b5e20">📦 ctx 对象存入 ThreadLocal</text>

  <rect x="605" y="250" width="190" height="25" rx="4" fill="#c8f5c8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="700" y="265" text-anchor="middle" font-size="11" fill="#333">.contextCapture() ← 捕获到 Reactor Context</text>

  <rect x="605" y="285" width="190" height="25" rx="4" fill="#b3f0b3" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="700" y="300" text-anchor="middle" font-size="11" fill="#333">.blockLast() ← 阻塞等待</text>

  <!-- Thread B (after) -->
  <rect x="840" y="95" width="220" height="300" rx="8" fill="#e6fae6" stroke="#2f9e44" stroke-width="2" filter="url(#rough)"/>
  <text x="950" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Thread B</text>
  <text x="950" y="130" text-anchor="middle" font-size="11" fill="#666">(reactor-http-nio-2)</text>

  <rect x="855" y="140" width="190" height="25" rx="4" fill="#c8f5c8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="950" y="157" text-anchor="middle" font-size="11" fill="#333">Reactor 自动恢复 ThreadLocal</text>

  <rect x="855" y="175" width="190" height="25" rx="4" fill="#a8f0a8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="950" y="191" text-anchor="middle" font-size="11" fill="#1b5e20">📦 ctx = 同一个对象引用 ✅</text>

  <rect x="855" y="210" width="190" height="25" rx="4" fill="#c8f5c8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="950" y="226" text-anchor="middle" font-size="11" fill="#333">KnowledgeSearchTool.apply()</text>

  <rect x="855" y="245" width="190" height="25" rx="4" fill="#c8f5c8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="950" y="261" text-anchor="middle" font-size="11" fill="#333">ctx.counter.incrementAndGet()</text>

  <rect x="855" y="280" width="190" height="25" rx="4" fill="#a8f0a8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="950" y="296" text-anchor="middle" font-size="11" fill="#1b5e20">ctx.steps.add(step) ← 共享可见 ✅</text>

  <!-- Shared ctx object -->
  <ellipse cx="825" cy="410" rx="100" ry="22" fill="#fff9c4" stroke="#f08c00" stroke-width="2" filter="url(#rough)"/>
  <text x="825" y="414" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c4d00">Heap: StepCollectorContext</text>

  <!-- Arrows from both threads to shared object -->
  <line x1="700" y1="393" x2="730" y2="390" stroke="#2f9e44" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <line x1="950" y1="393" x2="920" y2="390" stroke="#2f9e44" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="700" y="388" text-anchor="middle" font-size="9" fill="#2f9e44">同一引用</text>
  <text x="950" y="388" text-anchor="middle" font-size="9" fill="#2f9e44">同一引用</text>

  <!-- Arrow showing context propagation from A to B -->
  <path d="M 795 265 Q 820 200 845 175" stroke="#f08c00" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="830" y="210" font-size="10" fill="#f08c00" transform="rotate(-55,830,210)">Micrometer 传播</text>

  <!-- ===== BOTTOM: How Context Propagation Works ===== -->
  <rect x="20" y="450" width="1060" height="350" rx="12" fill="#f8f9ff" stroke="#4c6ef5" stroke-width="2" filter="url(#rough)" stroke-dasharray="6,2"/>
  <text x="550" y="475" text-anchor="middle" font-size="15" font-weight="bold" fill="#4c6ef5">方案A 实现机制 &amp; 方案B 说明</text>

  <!-- Left: Method A mechanism -->
  <rect x="35" y="485" width="500" height="300" rx="8" fill="#eef2ff" stroke="#4c6ef5" stroke-width="1.5"/>
  <text x="285" y="505" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b5bdb">方案A：Micrometer ThreadLocalAccessor</text>

  <text x="50" y="530" font-size="11" fill="#333">1. StepCollectorContext  — 单一可变对象（持有 steps/counter/queries）</text>
  <text x="50" y="550" font-size="11" fill="#333">2. StepCollectorContextAccessor — 告诉 Micrometer 哪个 ThreadLocal 要传播</text>
  <text x="50" y="570" font-size="11" fill="#333">3. ContextRegistry.registerThreadLocalAccessor(new Accessor())</text>
  <text x="50" y="590" font-size="11" fill="#333">4. Hooks.enableAutomaticContextPropagation()  — 全局开关</text>
  <text x="50" y="620" font-size="11" fill="#333">5. .contextCapture()  — 在 pipeline 中显式捕获（双重保障）</text>

  <rect x="50" y="635" width="470" height="55" rx="6" fill="#dce8ff" stroke="#4c6ef5" stroke-width="1.5"/>
  <text x="285" y="655" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b5bdb">关键：传播的是"对象引用"，不是值拷贝</text>
  <text x="285" y="673" text-anchor="middle" font-size="11" fill="#333">Thread A 和 Thread B 指向 Heap 上同一个 StepCollectorContext 对象</text>
  <text x="285" y="690" text-anchor="middle" font-size="11" fill="#333">→ 任意线程的修改对所有线程立即可见</text>

  <rect x="50" y="700" width="470" height="70" rx="6" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="285" y="720" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">线程安全设计</text>
  <text x="285" y="738" text-anchor="middle" font-size="10" fill="#555">steps: Collections.synchronizedList  |  counter: AtomicInteger</text>
  <text x="285" y="754" text-anchor="middle" font-size="10" fill="#555">retrievedQueries: ConcurrentHashMap.newKeySet()  |  stepListener: volatile</text>
  <text x="285" y="770" text-anchor="middle" font-size="10" fill="#aaa">（Spring AI tool calling 是顺序的，并发访问概率低，but safe is better）</text>

  <!-- Right: Method B explanation -->
  <rect x="555" y="485" width="510" height="300" rx="8" fill="#fff3e0" stroke="#f08c00" stroke-width="1.5"/>
  <text x="810" y="505" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">方案B：publishOn 钉线程 — 常见误解</text>

  <text x="570" y="530" font-size="11" fill="#333">chatClient.stream().chatResponse()</text>
  <text x="570" y="548" font-size="11" fill="#e65100">  .publishOn(Schedulers.fromExecutor(chatStreamExecutor))</text>
  <text x="570" y="566" font-size="11" fill="#333">  .doOnNext(chunk → ...)</text>
  <text x="570" y="584" font-size="11" fill="#333">  .blockLast()</text>

  <rect x="570" y="598" width="480" height="50" rx="6" fill="#ffe0b2" stroke="#f08c00" stroke-width="1.5"/>
  <text x="810" y="618" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">publishOn 只影响下游 (doOnNext)</text>
  <text x="810" y="635" text-anchor="middle" font-size="11" fill="#333">Spring AI 的 tool 执行在 Spring AI 内部的 flatMap 里（上游），不受影响</text>

  <rect x="570" y="658" width="480" height="50" rx="6" fill="#ffe0b2" stroke="#f08c00" stroke-width="1.5"/>
  <text x="810" y="678" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">subscribeOn 也不可行</text>
  <text x="810" y="695" text-anchor="middle" font-size="11" fill="#333">用 chatStreamExecutor 作为 subscribeOn scheduler → 可能死锁</text>
  <text x="810" y="710" text-anchor="middle" font-size="10" fill="#999">（blockLast 占用了 chatStreamExecutor 线程，subscribeOn 想用同一池→无线程可用）</text>

  <rect x="570" y="718" width="480" height="55" rx="6" fill="#fff3e0" stroke="#f08c00" stroke-width="1.5"/>
  <text x="810" y="738" text-anchor="middle" font-size="11" font-weight="bold" fill="#7b4f00">结论：方案B 无法在不修改 Spring AI 的情况下</text>
  <text x="810" y="756" text-anchor="middle" font-size="11" fill="#7b4f00">真正把 tool 执行钉在 chatStreamExecutor 线程上</text>
  <text x="810" y="772" text-anchor="middle" font-size="10" fill="#aaa">方案A（Micrometer 传播）是正确且不侵入 Spring AI 的解法</text>
</svg>
