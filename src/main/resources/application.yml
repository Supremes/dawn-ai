spring:
  application:
    name: dawn-ai

  # DataSource (PostgreSQL with pgvector extension)
  datasource:
    url: jdbc:postgresql://localhost:5432/dawn_ai
    username: dawn
    password: dawn123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Redis (Conversation Memory)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  # Spring AI - OpenAI
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${BASE_URL}
      chat:
        base-url: ${CHAT_BASE_URL:${BASE_URL}}
        api-key: ${CHAT_API_KEY:${OPENAI_API_KEY}}
        options:
          model: ${CHAT_MODEL}
          temperature: 0.7
          max-tokens: 2048
      embedding:
        base-url: ${EMBEDDING_BASE_URL:${BASE_URL}}
        api-key: ${EMBEDDING_API_KEY:${OPENAI_API_KEY}}
        options:
          model: ${EMBEDDING_MODEL}
          encodingFormat: float
          dimensions: ${EMBEDDING_DIMENSIONS:1536}

    # Vector Store - PGVector
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${EMBEDDING_DIMENSIONS:1536}
        initialize-schema: true

server:
  port: 8080

# Actuator & Prometheus Metrics
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Application config
app:
  ai:
    react:
      max-steps: 10        # 单次对话最多工具调用次数（超出时 LLM 自行收敛）
      show-steps: true    # 响应体中是否包含 steps 详情
      plan-enabled: true   # 是否启用执行前规划（关闭后跳过 TaskPlanner）
    stream:
      timeout-ms: 120000   # SSE 单次请求最大等待时长（毫秒）
    rag:
      chunk-size: 500                 # 单个 chunk 的 token 数
      chunk-overlap: 50              # 相邻 chunk 的重叠 token 数
      similarity-threshold: 0.45  # 向量相似度过滤阈值，低于此值的文档被丢弃 (bge-m3 cosine scores are typically 0.4-0.65)
      default-top-k: 5            # 最终返回的文档数
      rerank-enabled: true        # 是否启用召回后的二阶段重排
      reranker:
        type: heuristic           # heuristic | cross-encoder
      hybrid-enabled: true        # 是否启用 BM25 + Dense 混合召回
      sparse:
        text-search-config: english  # PostgreSQL FTS 配置名，例如 english | simple | custom config
      cross-encoder:
        base-url: ""              # 可选：cross-encoder rerank 服务地址，例如 http://localhost:8081
        rerank-path: /rerank      # rerank 接口路径，默认请求体含 query/documents/top_n
        model: ""                 # 可选：请求体中的模型名
        api-key: ""               # 可选：访问 rerank 服务的 API key
        api-key-header: Authorization
        api-key-prefix: "Bearer "
        max-document-chars: 4000  # 发送到 reranker 的单文档最大字符数
      query-rewrite-enabled: true  # 检索前是否用 LLM 改写查询，false 时原样传入
      max-calls-per-session: 3    # 每次请求最多 RAG 工具调用次数，独立于 maxSteps
    system-prompt: |
      You are Dawn AI, a helpful and knowledgeable assistant powered by advanced AI.
      You can help with calculations, weather queries, and answer questions based on your knowledge base.
      Always be concise, accurate, and helpful.
      Before calling a tool, briefly explain your reasoning in one sentence.

logging:
  level:
    com.dawn.ai: DEBUG
    org.springframework.ai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
