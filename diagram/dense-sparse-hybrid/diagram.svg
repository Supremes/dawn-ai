<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 526" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <style>
    .t  { font-size: 14px; font-weight: 400; fill: #2C2C2A; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .title   { font-size: 20px; font-weight: 600; fill: #2C2C2A; }
    .eyebrow { font-size: 10px; font-weight: 500; fill: #888780; letter-spacing: 1.2px; text-transform: uppercase; }
    .caption { font-size: 12px; font-weight: 400; fill: #888780; font-style: italic; }
    .anno    { font-size: 12px; font-weight: 400; fill: #888780; }
    .box   { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
    .row-alt { fill: #FFFFFF; stroke: #D3D1C7; stroke-width: 0.5; }
    .arr   { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .arr-alt { fill: none; stroke: #5F5E5A; stroke-width: 1.5; stroke-dasharray: 5 4; }
    .leader{ fill: none; stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 3 3; }
    .lifeline { fill: none; stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 4 4; }

    .arr-gray   { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
    .arr-blue   { fill: none; stroke: #185FA5; stroke-width: 1.5; }
    .arr-teal   { fill: none; stroke: #0F6E56; stroke-width: 1.5; }
    .arr-purple { fill: none; stroke: #534AB7; stroke-width: 1.5; }
    .arr-coral  { fill: none; stroke: #993C1D; stroke-width: 1.5; }
    .arr-pink   { fill: none; stroke: #993556; stroke-width: 1.5; }
    .arr-amber  { fill: none; stroke: #854F0B; stroke-width: 1.5; }
    .arr-green  { fill: none; stroke: #3B6D11; stroke-width: 1.5; }
    .arr-red    { fill: none; stroke: #A32D2D; stroke-width: 1.5; }

    .c-gray   > rect, .c-gray   > circle, .c-gray   > ellipse, rect.c-gray, circle.c-gray, ellipse.c-gray { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .c-gray   .th, .c-gray   .t  { fill: #444441; }
    .c-gray   .ts                { fill: #5F5E5A; }

    .c-blue   > rect, .c-blue   > circle, .c-blue   > ellipse, rect.c-blue, circle.c-blue, ellipse.c-blue { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
    .c-blue   .th, .c-blue   .t  { fill: #0C447C; }
    .c-blue   .ts                { fill: #185FA5; }

    .c-teal   > rect, .c-teal   > circle, .c-teal   > ellipse, rect.c-teal, circle.c-teal, ellipse.c-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .c-teal   .th, .c-teal   .t  { fill: #085041; }
    .c-teal   .ts                { fill: #0F6E56; }

    .c-purple > rect, .c-purple > circle, .c-purple > ellipse, rect.c-purple, circle.c-purple, ellipse.c-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .c-purple .th, .c-purple .t  { fill: #3C3489; }
    .c-purple .ts                { fill: #534AB7; }

    .c-coral  > rect, .c-coral  > circle, .c-coral  > ellipse, rect.c-coral, circle.c-coral, ellipse.c-coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .c-coral  .th, .c-coral  .t  { fill: #712B13; }
    .c-coral  .ts                { fill: #993C1D; }

    .c-pink   > rect, .c-pink   > circle, .c-pink   > ellipse, rect.c-pink, circle.c-pink, ellipse.c-pink { fill: #FBEAF0; stroke: #993556; stroke-width: 0.5; }
    .c-pink   .th, .c-pink   .t  { fill: #72243E; }
    .c-pink   .ts                { fill: #993556; }

    .c-amber  > rect, .c-amber  > circle, .c-amber  > ellipse, rect.c-amber, circle.c-amber, ellipse.c-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
    .c-amber  .th, .c-amber  .t  { fill: #633806; }
    .c-amber  .ts                { fill: #854F0B; }

    .c-green  > rect, .c-green  > circle, .c-green  > ellipse, rect.c-green, circle.c-green, ellipse.c-green { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 0.5; }
    .c-green  .th, .c-green  .t  { fill: #27500A; }
    .c-green  .ts                { fill: #3B6D11; }

    .c-red    > rect, .c-red    > circle, .c-red    > ellipse, rect.c-red, circle.c-red, ellipse.c-red { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
    .c-red    .th, .c-red    .t  { fill: #791F1F; }
    .c-red    .ts                { fill: #A32D2D; }

    @media (prefers-color-scheme: dark) {
      .t, .th { fill: #F1EFE8; }
      .ts     { fill: #B4B2A9; }
      .title   { fill: #F1EFE8; }
      .eyebrow { fill: #888780; }
      .caption { fill: #888780; }
      .anno    { fill: #888780; }
      .box    { fill: #2C2C2A; stroke: #888780; }
      .row-alt { fill: #444441; stroke: #5F5E5A; }
      .arr    { stroke: #B4B2A9; }
      .arr-alt { stroke: #B4B2A9; }
      .leader { stroke: #888780; }
      .lifeline { stroke: #5F5E5A; }

      .arr-gray   { stroke: #B4B2A9; }
      .arr-blue   { stroke: #85B7EB; }
      .arr-teal   { stroke: #5DCAA5; }
      .arr-purple { stroke: #AFA9EC; }
      .arr-coral  { stroke: #F0997B; }
      .arr-pink   { stroke: #ED93B1; }
      .arr-amber  { stroke: #EF9F27; }
      .arr-green  { stroke: #97C459; }
      .arr-red    { stroke: #F09595; }

      .c-gray   > rect, .c-gray   > circle, .c-gray   > ellipse, rect.c-gray, circle.c-gray, ellipse.c-gray { fill: #444441; stroke: #B4B2A9; }
      .c-gray   .th, .c-gray   .t  { fill: #F1EFE8; }
      .c-gray   .ts                { fill: #D3D1C7; }

      .c-blue   > rect, .c-blue   > circle, .c-blue   > ellipse, rect.c-blue, circle.c-blue, ellipse.c-blue { fill: #0C447C; stroke: #85B7EB; }
      .c-blue   .th, .c-blue   .t  { fill: #B5D4F4; }
      .c-blue   .ts                { fill: #85B7EB; }

      .c-teal   > rect, .c-teal   > circle, .c-teal   > ellipse, rect.c-teal, circle.c-teal, ellipse.c-teal { fill: #085041; stroke: #5DCAA5; }
      .c-teal   .th, .c-teal   .t  { fill: #9FE1CB; }
      .c-teal   .ts                { fill: #5DCAA5; }

      .c-purple > rect, .c-purple > circle, .c-purple > ellipse, rect.c-purple, circle.c-purple, ellipse.c-purple { fill: #3C3489; stroke: #AFA9EC; }
      .c-purple .th, .c-purple .t  { fill: #CECBF6; }
      .c-purple .ts                { fill: #AFA9EC; }

      .c-coral  > rect, .c-coral  > circle, .c-coral  > ellipse, rect.c-coral, circle.c-coral, ellipse.c-coral { fill: #712B13; stroke: #F0997B; }
      .c-coral  .th, .c-coral  .t  { fill: #F5C4B3; }
      .c-coral  .ts                { fill: #F0997B; }

      .c-pink   > rect, .c-pink   > circle, .c-pink   > ellipse, rect.c-pink, circle.c-pink, ellipse.c-pink { fill: #72243E; stroke: #ED93B1; }
      .c-pink   .th, .c-pink   .t  { fill: #F4C0D1; }
      .c-pink   .ts                { fill: #ED93B1; }

      .c-amber  > rect, .c-amber  > circle, .c-amber  > ellipse, rect.c-amber, circle.c-amber, ellipse.c-amber { fill: #633806; stroke: #EF9F27; }
      .c-amber  .th, .c-amber  .t  { fill: #FAC775; }
      .c-amber  .ts                { fill: #EF9F27; }

      .c-green  > rect, .c-green  > circle, .c-green  > ellipse, rect.c-green, circle.c-green, ellipse.c-green { fill: #27500A; stroke: #97C459; }
      .c-green  .th, .c-green  .t  { fill: #C0DD97; }
      .c-green  .ts                { fill: #97C459; }

      .c-red    > rect, .c-red    > circle, .c-red    > ellipse, rect.c-red, circle.c-red, ellipse.c-red { fill: #791F1F; stroke: #F09595; }
      .c-red    .th, .c-red    .t  { fill: #F7C1C1; }
      .c-red    .ts                { fill: #F09595; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">Dense, sparse, and hybrid retrieval</text>
  <text class="ts" x="340" y="46" text-anchor="middle" dominant-baseline="central">Why BM25 is sparse, why vectors are dense, and where hybrid fits</text>

  <path d="M340 114 L120 114 L120 188" class="arr" fill="none" marker-end="url(#arrow)"/>
  <line x1="340" y1="114" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>
  <path d="M340 114 L540 114 L540 188" class="arr" fill="none" marker-end="url(#arrow)"/>

  <line x1="120" y1="234" x2="120" y2="250" class="arr-purple" marker-end="url(#arrow)"/>
  <line x1="120" y1="296" x2="120" y2="312" class="arr-purple" marker-end="url(#arrow)"/>
  <line x1="120" y1="358" x2="120" y2="374" class="arr" marker-end="url(#arrow)"/>

  <line x1="330" y1="234" x2="330" y2="250" class="arr-teal" marker-end="url(#arrow)"/>
  <line x1="330" y1="296" x2="330" y2="312" class="arr-teal" marker-end="url(#arrow)"/>
  <line x1="330" y1="358" x2="330" y2="374" class="arr" marker-end="url(#arrow)"/>

  <path d="M540 234 L495 234 L495 250" class="arr-purple" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 234 L585 234 L585 250" class="arr-teal" fill="none" marker-end="url(#arrow)"/>
  <path d="M495 296 L495 304 L510 304 L510 312" class="arr-purple" fill="none" marker-end="url(#arrow)"/>
  <path d="M585 296 L585 304 L570 304 L570 312" class="arr-teal" fill="none" marker-end="url(#arrow)"/>
  <line x1="540" y1="358" x2="540" y2="374" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="260" y="70" width="160" height="44" rx="8"/>
    <text class="th" x="340" y="92" text-anchor="middle" dominant-baseline="central">User query</text>
  </g>

  <g class="c-gray">
    <rect x="20" y="140" width="200" height="300" rx="20" fill="none" stroke-dasharray="4 4"/>
    <text class="th" x="40" y="164" dominant-baseline="central">Dense recall</text>
    <text class="ts" x="40" y="182" dominant-baseline="central">Semantic first</text>
  </g>
  <g class="c-gray">
    <rect x="230" y="140" width="200" height="300" rx="20" fill="none" stroke-dasharray="4 4"/>
    <text class="th" x="250" y="164" dominant-baseline="central">Sparse / BM25</text>
    <text class="ts" x="250" y="182" dominant-baseline="central">Terms first</text>
  </g>
  <g class="c-gray">
    <rect x="440" y="140" width="200" height="300" rx="20" fill="none" stroke-dasharray="4 4"/>
    <text class="th" x="460" y="164" dominant-baseline="central">Hybrid retrieval</text>
    <text class="ts" x="460" y="182" dominant-baseline="central">Two signals</text>
  </g>

  <g class="c-purple">
    <rect x="40" y="190" width="160" height="44" rx="6"/>
    <text class="th" x="120" y="212" text-anchor="middle" dominant-baseline="central">Embedding</text>
  </g>
  <g class="c-purple">
    <rect x="40" y="252" width="160" height="44" rx="6"/>
    <text class="th" x="120" y="274" text-anchor="middle" dominant-baseline="central">Vector index</text>
  </g>
  <g class="c-purple">
    <rect x="40" y="314" width="160" height="44" rx="6"/>
    <text class="th" x="120" y="336" text-anchor="middle" dominant-baseline="central">Similarity search</text>
  </g>
  <g class="c-gray">
    <rect x="40" y="376" width="160" height="44" rx="6"/>
    <text class="th" x="120" y="398" text-anchor="middle" dominant-baseline="central">Top-K docs</text>
  </g>

  <g class="c-teal">
    <rect x="250" y="190" width="160" height="44" rx="6"/>
    <text class="th" x="330" y="212" text-anchor="middle" dominant-baseline="central">Tokenize</text>
  </g>
  <g class="c-teal">
    <rect x="250" y="252" width="160" height="44" rx="6"/>
    <text class="th" x="330" y="274" text-anchor="middle" dominant-baseline="central">BM25 rank</text>
  </g>
  <g class="c-teal">
    <rect x="250" y="314" width="160" height="44" rx="6"/>
    <text class="th" x="330" y="336" text-anchor="middle" dominant-baseline="central">Field match</text>
  </g>
  <g class="c-gray">
    <rect x="250" y="376" width="160" height="44" rx="6"/>
    <text class="th" x="330" y="398" text-anchor="middle" dominant-baseline="central">Top-K docs</text>
  </g>

  <g class="c-gray">
    <rect x="480" y="190" width="120" height="44" rx="6"/>
    <text class="th" x="540" y="212" text-anchor="middle" dominant-baseline="central">Dual recall</text>
  </g>
  <g class="c-purple">
    <rect x="460" y="252" width="70" height="44" rx="6"/>
    <text class="th" x="495" y="274" text-anchor="middle" dominant-baseline="central">Dense</text>
  </g>
  <g class="c-teal">
    <rect x="550" y="252" width="70" height="44" rx="6"/>
    <text class="th" x="585" y="274" text-anchor="middle" dominant-baseline="central">BM25</text>
  </g>
  <g class="c-gray">
    <rect x="470" y="314" width="140" height="44" rx="6"/>
    <text class="th" x="540" y="336" text-anchor="middle" dominant-baseline="central">Merge &amp; dedup</text>
  </g>
  <g class="c-gray">
    <rect x="480" y="376" width="120" height="44" rx="6"/>
    <text class="th" x="540" y="398" text-anchor="middle" dominant-baseline="central">Rerank</text>
  </g>

  <text class="ts" x="120" y="462" text-anchor="middle" dominant-baseline="central">同义表达</text>
  <text class="ts" x="120" y="478" text-anchor="middle" dominant-baseline="central">自然语言</text>
  <text class="ts" x="330" y="462" text-anchor="middle" dominant-baseline="central">术语与版本号</text>
  <text class="ts" x="330" y="478" text-anchor="middle" dominant-baseline="central">精确过滤</text>
  <text class="ts" x="540" y="462" text-anchor="middle" dominant-baseline="central">先双路召回</text>
  <text class="ts" x="540" y="478" text-anchor="middle" dominant-baseline="central">再融合排序</text>

  <rect class="c-purple" x="100" y="492" width="12" height="12" rx="3"/>
  <text class="ts" x="120" y="498" dominant-baseline="central">Semantic</text>
  <rect class="c-teal" x="290" y="492" width="12" height="12" rx="3"/>
